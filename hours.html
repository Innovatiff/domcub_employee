<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hours — Domcub</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <div class="brand-icon"><i class="fa-solid fa-mobile-screen-button"></i></div>
      <div><div class="brand-name">Domcub</div><div class="brand-sub">Employee Portal</div></div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="index.html"         class="nav-link"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
    <a href="employees.html"     class="nav-link"><i class="fa-solid fa-users"></i><span>Employees</span></a>
    <a href="jobs.html"          class="nav-link"><i class="fa-solid fa-briefcase"></i><span>Job Positions</span></a>
    <div class="nav-section-label">Time</div>
    <a href="hours.html"         class="nav-link active"><i class="fa-solid fa-clock"></i><span>Hours</span></a>
    <a href="pay-statement.html" class="nav-link"><i class="fa-solid fa-file-invoice-dollar"></i><span>Pay Statements</span></a>
    <a href="time-off.html"      class="nav-link"><i class="fa-solid fa-calendar-days"></i><span>Time Off</span></a>
  </nav>
  <div class="sidebar-footer">
    <div id="sidebarUser" style="margin-bottom:12px"></div>
    <select class="store-selector" id="storeFilter" onchange="onStoreChange(this.value)">
      <option value="all">All Stores</option>
      <option value="1">Store 1</option>
      <option value="2">Store 2</option>
    </select>
    <button onclick="signOut()" style="margin-top:10px;width:100%;padding:8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.6);font-family:Inter,sans-serif;font-size:12.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
      <i class="fa-solid fa-right-from-bracket"></i> Sign Out
    </button>
  </div>
</aside>

<main class="main">
  <div class="page-header-row">
    <div class="page-header">
      <h1>Hours Tracking</h1>
      <p>View and manage employee hours by pay period.</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" onclick="openAddEntry()"><i class="fa-solid fa-plus"></i> Add Entry</button>
      <button class="btn btn-primary" onclick="openSavePeriod()"><i class="fa-solid fa-floppy-disk"></i> Save Period</button>
    </div>
  </div>

  <!-- Period Nav -->
  <div class="period-nav">
    <button class="btn-icon" onclick="shiftPeriod(-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <div style="flex:1;text-align:center">
      <div class="period-label" id="periodLabel">—</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px" id="periodSub"></div>
    </div>
    <button class="btn-icon" onclick="shiftPeriod(1)"><i class="fa-solid fa-chevron-right"></i></button>
  </div>

  <!-- Store tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="filterStore('all',this)">All Stores</button>
    <button class="tab-btn" onclick="filterStore('1',this)">Store 1</button>
    <button class="tab-btn" onclick="filterStore('2',this)">Store 2</button>
  </div>

  <!-- Summary -->
  <div id="periodSummary" style="display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap"></div>

  <!-- Accordion -->
  <div id="hoursAccordion">
    <div style="text-align:center;padding:48px;color:var(--text-muted)"><i class="fa-solid fa-spinner fa-spin" style="font-size:24px"></i></div>
  </div>
</main>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="addEntryModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Hours Entry</h3>
      <button class="modal-close" onclick="closeModal('addEntryModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Employee</label>
        <select id="entryEmp"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="entryDate">
        </div>
        <div class="form-group">
          <label>Clock In</label>
          <input type="time" id="entryIn" value="08:00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Clock Out</label>
          <input type="time" id="entryOut" value="16:00">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addEntryModal')">Cancel</button>
      <button class="btn btn-primary" id="saveEntryBtn" onclick="doSaveEntry()">Add Entry</button>
    </div>
  </div>
</div>

<!-- Save Period Modal -->
<div class="modal-overlay" id="savePeriodModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>Save Period & Generate Payroll</h3>
      <button class="modal-close" onclick="closeModal('savePeriodModal')">&times;</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:14px" id="savePeriodText"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('savePeriodModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmSaveBtn" onclick="doSavePeriod()">Confirm & Save</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
let periodIndex = getPeriodIndex(new Date());
let storeFilter = 'all';
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

document.getElementById('storeFilter').value = getSelectedStore();
requireAuth(() => render());

function onStoreChange(v) { setSelectedStore(v); render(); }

function filterStore(val, btn) {
  storeFilter = val;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function shiftPeriod(dir) { periodIndex += dir; render(); }

async function render() {
  const period = getPeriodByIndex(periodIndex);
  const cur    = getCurrentPeriod();

  document.getElementById('periodLabel').textContent = formatPeriodLabel(period);
  document.getElementById('periodSub').textContent   =
    periodIndex === cur.index ? 'Current period' :
    periodIndex  < cur.index ? 'Past period' : 'Future period';

  const store = getSelectedStore();
  const [allEmps, jobs, cis] = await Promise.all([
    getEmployees(),
    getJobs(),
    getClockInsRange(period.start, period.end)
  ]);

  let emps = allEmps.filter(e => e.status === 'active');
  if (storeFilter !== 'all') emps = emps.filter(e => e.store === storeFilter);
  else if (store !== 'all')  emps = emps.filter(e => e.store === store);

  // Summary
  const totalHrs = emps.reduce((s, e) => {
    return s + cis.filter(c => c.employeeId === e.id && c.clockOut).reduce((h, c) => h + (c.hours||0), 0);
  }, 0);

  document.getElementById('periodSummary').innerHTML = `
    <div class="stat-card" style="flex:1;min-width:140px">
      <div class="stat-label">Total Hours</div>
      <div class="stat-value">${totalHrs.toFixed(1)}</div>
    </div>
    <div class="stat-card" style="flex:1;min-width:140px">
      <div class="stat-label">Employees</div>
      <div class="stat-value">${emps.length}</div>
    </div>
    <div class="stat-card" style="flex:1;min-width:140px">
      <div class="stat-label">Avg Hours / Employee</div>
      <div class="stat-value">${emps.length ? (totalHrs/emps.length).toFixed(1) : '0'}</div>
    </div>
  `;

  // Days in period
  const days = [];
  let d = new Date(period.start + 'T00:00:00');
  const endD = new Date(period.end + 'T00:00:00');
  while (d <= endD) { days.push(toDateStr(d)); d.setDate(d.getDate()+1); }

  const acc = document.getElementById('hoursAccordion');
  if (emps.length === 0) {
    acc.innerHTML = `<div class="card"><div class="card-body"><div class="empty-state"><i class="fa-solid fa-clock"></i><p>No employees to display.</p></div></div></div>`;
    return;
  }

  acc.innerHTML = emps.map(emp => {
    const job     = jobs.find(j => j.id === emp.jobId);
    const empCIs  = cis.filter(c => c.employeeId === emp.id);
    const totalH  = empCIs.filter(c => c.clockOut).reduce((s,c) => s+(c.hours||0), 0);
    const estPay  = (totalH * (emp.hourlyRate || 0)).toFixed(2);

    const rows = days.map(dateStr => {
      const d2       = new Date(dateStr + 'T00:00:00');
      const isWeekend = d2.getDay() === 0 || d2.getDay() === 6;
      const dayCIs   = empCIs.filter(c => c.date === dateStr);
      const future   = dateStr > todayStr();

      if (dayCIs.length === 0) {
        return `<tr style="${isWeekend?'color:var(--text-light);background:#fafbfd':''}">
          <td>${formatDateShort(dateStr)}</td>
          <td>${DAY_NAMES[d2.getDay()]}</td>
          <td colspan="2" style="color:var(--text-light)">${future?'—':isWeekend?'Weekend':'No record'}</td>
          <td>—</td>
          <td><span class="badge badge-gray">${future?'upcoming':isWeekend?'—':'absent'}</span></td>
          <td></td>
        </tr>`;
      }

      return dayCIs.map(ci => `<tr>
        <td>${formatDateShort(ci.date)}</td>
        <td>${DAY_NAMES[d2.getDay()]}</td>
        <td>${formatTime(ci.clockIn)}</td>
        <td>${ci.clockOut ? formatTime(ci.clockOut) : '<span class="badge badge-green">Active</span>'}</td>
        <td><strong>${ci.clockOut ? (ci.hours||0).toFixed(2)+'h' : '—'}</strong></td>
        <td>${ci.clockOut ? '<span class="badge badge-green">Complete</span>' : '<span class="badge badge-yellow">In Progress</span>'}</td>
        <td><button class="btn-icon btn-sm" onclick="doDeleteEntry('${ci.id}')" title="Remove"><i class="fa-solid fa-xmark" style="font-size:11px"></i></button></td>
      </tr>`).join('');
    }).join('');

    return `
    <div class="hours-employee">
      <div class="hours-emp-header" onclick="toggleEmp(this)">
        <div class="hours-emp-left">
          ${avatarHtml(emp.name)}
          <div>
            <div class="employee-name">${emp.name}</div>
            <div class="employee-sub">${job ? job.title : '—'} · Store ${emp.store}</div>
          </div>
        </div>
        <div class="hours-emp-right">
          <div class="hours-total">${totalH.toFixed(2)}h total</div>
          <span class="badge badge-gray">$${estPay} est.</span>
          <i class="fa-solid fa-chevron-down" style="color:var(--text-muted);font-size:12px;transition:transform 0.2s"></i>
        </div>
      </div>
      <div class="hours-emp-body">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Day</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>Status</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleEmp(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.fa-chevron-down');
  body.classList.toggle('open');
  if (icon) icon.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

let empsCache = [];

async function openAddEntry() {
  empsCache = await getEmployees();
  const active = empsCache.filter(e => e.status === 'active');
  document.getElementById('entryEmp').innerHTML = active.map(e =>
    `<option value="${e.id}">${e.name} — Store ${e.store}</option>`
  ).join('');
  document.getElementById('entryDate').value = todayStr();
  openModal('addEntryModal');
}

async function doSaveEntry() {
  const empId   = document.getElementById('entryEmp').value;
  const dateStr = document.getElementById('entryDate').value;
  const inTime  = document.getElementById('entryIn').value;
  const outTime = document.getElementById('entryOut').value;
  if (!empId || !dateStr || !inTime || !outTime) { alert('Please fill all fields.'); return; }
  if (outTime <= inTime) { alert('Clock-out must be after clock-in.'); return; }

  const emp = empsCache.find(e => e.id === empId);
  const ciTime  = new Date(`${dateStr}T${inTime}:00`);
  const coTime  = new Date(`${dateStr}T${outTime}:00`);
  const hours   = calculateHours(ciTime.toISOString(), coTime.toISOString());

  const btn = document.getElementById('saveEntryBtn');
  btn.disabled = true;
  try {
    await db.collection('ClockIns').add({
      employeeId: empId,
      store: emp ? emp.store : '',
      clockIn:  firebase.firestore.Timestamp.fromDate(ciTime),
      clockOut: firebase.firestore.Timestamp.fromDate(coTime),
      date: dateStr,
      hours
    });
    closeModal('addEntryModal');
    render();
  } catch (err) {
    alert('Error saving: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

async function doDeleteEntry(id) {
  if (!confirm('Remove this entry?')) return;
  await deleteClockIn(id);
  render();
}

function openSavePeriod() {
  const period = getPeriodByIndex(periodIndex);
  document.getElementById('savePeriodText').textContent =
    `Save and generate pay statements for ${formatPeriodLabel(period)}? Existing statements for this period will be replaced.`;
  openModal('savePeriodModal');
}

async function doSavePeriod() {
  const period = getPeriodByIndex(periodIndex);
  const btn    = document.getElementById('confirmSaveBtn');
  btn.disabled = true;
  try {
    const [emps, cis] = await Promise.all([
      getEmployees(),
      getClockInsRange(period.start, period.end)
    ]);
    const active = emps.filter(e => e.status === 'active');

    // Delete existing statements for this period
    const existing = await getPayStatements(period.start);
    await Promise.all(existing.map(s => db.collection('PayStatements').doc(s.id).delete()));

    // Create new
    await Promise.all(active.map(emp => {
      const empHours = cis
        .filter(c => c.employeeId === emp.id && c.clockOut)
        .reduce((s, c) => s + (c.hours || 0), 0);
      const gross = Math.round(empHours * emp.hourlyRate * 100) / 100;
      return savePayStatement({
        periodStart: period.start,
        periodEnd:   period.end,
        employeeId:  emp.id,
        hours:       Math.round(empHours * 100) / 100,
        rate:        emp.hourlyRate || 0,
        gross,
        status:      'pending',
        paidDate:    null
      });
    }));

    closeModal('savePeriodModal');
    alert('Period saved! Pay statements generated successfully.');
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
